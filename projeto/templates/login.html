<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}" />
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon.png') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <title>Game Store - Login</title>
</head>

<body>
  <div class="login-wrapper">

    <div class="login-brand">
      <h1>GAME STORE</h1>
      <p>BOARD GAMES & CARD GAMES</p>
    </div>

    <div class="login-card">
      <h2>Acesso ao Sistema</h2>
      <p class="login-sub">Entre com suas credenciais para continuar</p>

      {% if error %}
      <div class="login-error">{{ error }}</div>
      {% endif %}

      <form action="/login" method="POST">
        <div class="field-group">
          <label for="usuario">Usuário</label>
          <input type="text" id="usuario" name="usuario" placeholder="Digite seu usuário" required autocomplete="off" />
        </div>
        <div class="field-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required />
        </div>
        <button type="submit">Entrar</button>
      </form>
    </div>

  </div>
</body>

</html>

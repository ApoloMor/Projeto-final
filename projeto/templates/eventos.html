<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../static/Eventos.css" />
    <title>Loja dos Games - Eventos</title>
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>

  <body>
    <!-- SIDEBAR -->

    <div class="sidebar">
      <div class="logo">
        <h1>GAME STORE</h1>
        <p>BOARD GAMES & CARD GAMES</p>
      </div>

      <div class="menu">
        <a href="Home.html">🏠 Início</a>
        <a href="#">📦 Produtos</a>
        <a href="#">👥 Clientes</a>
        <a href="#">🚚 Fornecedores</a>
        <a href="eventos.html" class="active">🏆 Eventos / Torneios</a>
        <a href="#">🛒 Vendas e Inscrições</a>
        <a href="#">📊 Relatórios</a>
        <a href="#">⚙️ Configurações</a>
      </div>
    </div>
    <div class="main">
      <p>
        <a class="links" id="atual-link" href="Home.html">Inicío</a> >
        <a class="links" href="eventos.html">Eventos/Torneios</a>
      </p>
      <div class="topo">
        <img src="#" alt="icon-trofeu" width="35px" height="35px" />
        <div class="titulo-subt">
          <h1>Eventos/Torneios</h1>
          <p>Gerencie os eventos e torneios da loja.</p>
        </div>
        <div class="botoes-titulo">
          <button class="new-event"><span>+</span> Novo Evento</button>
          <button class="export">Exportar</button>
        </div>
        <div class="data">
          <i data-lucide="clock-3"></i>
          <div class="data-textos">
            <h4>1 de Junho de 2026</h4>
            <p>Segunda, 09:00</p>
          </div>
        </div>
      </div>
      <div class="content">
        <div class="tabs">
          <button class="tab active">Todos</button>
          <button class="tab">Próximos</button>
          <button class="tab">Em andamento</button>
          <button class="tab">Finalizados</button>
          <button class="tab">Cancelados</button>
          <input
            id="busca-input"
            type="text"
            class="search"
            placeholder="🔍 Buscar eventos..."
          />
        </div>
        <div class="eventos"></div>
        <div class="barra direita"><h3>Resumo de Eventos</h3></div>
      </div>
    </div>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
